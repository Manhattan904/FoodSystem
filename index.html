<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>校園美食系統</title>
</head>
<body>
    <h1>🍔 校園美食系統</h1>
    
    <label>選擇攤位：</label>
    <select id="stallSelect">
        </select>
    <button onclick="checkIn()">📍 簽到</button>

    <script>
        // 設定雲端 API 的網址
        const API_URL = 'https://campus-food-api.onrender.com';

        // 載入攤位資料
        async function loadStalls() {
            try {
                const response = await fetch(`${API_URL}/stalls`);
                const stalls = await response.json();
                const select = document.getElementById('stallSelect');
                
                stalls.forEach(stall => {
                    let option = document.createElement('option');
                    option.value = stall.id;
                    option.textContent = `${stall.name} (${stall.location})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("無法連接到雲端後端:", error);
                alert("後端連線失敗，請檢查網路！");
            }
        }

        // 簽到功能
        async function checkIn() {
            const stallId = document.getElementById('stallSelect').value;
            try {
                const response = await fetch(`${API_URL}/checkins`, {
                    method: 'POST',
                    body: stallId
                });
                const result = await response.json();
                alert(result.status);
            } catch (error) {
                alert("簽到失敗！");
            }
        }

        // 網頁啟動時載入資料
        window.onload = loadStalls;
    </script>
</body>
</html>
